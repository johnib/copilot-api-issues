name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Start copilot-api with `npx copilot-api-node20`
        2. Send a request to ...
        3. See error ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Which version of copilot-api are you using?
      placeholder: "0.20.0"
    validations:
      required: true
  - type: dropdown
    id: runtime
    attributes:
      label: Runtime
      options:
        - Node.js
        - Bun
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any relevant log output.
      render: shell
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other context — OS, client tool (Claude Code, Codex CLI, etc.), config flags.
